<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>working with text</title>
</head>

<body>
	<h1>Blog</h1>
	<h2>post 1</h2>
	<pre>
	Lorem ipsum dolor sit amet <em>consectetur</em> adipisicing elit. Provident ipsum, <strong>
	recusandae optio laboriosam doloremque</strong>, 
	enim minus blanditiis voluptate dicta saepe neque accusamus temporibus possimus ipsam dignissimos ipsa
	soluta quo amet.</pre>
</body>

</html>

<!-- To get some practice working with text in HTML, create a plain blog article page which 
uses different headings, uses paragraphs, and has some text in the paragraphs bolded 
and italicized. You can use Lorem Ipsum to generate dummy text, in place of real text 
as you build your sites. VS Code includes a shortcut to generate lorem ipsum for you. 
To trigger the shortcut, type lorem on the line where you want the dummy text, then press 
the Enter key, and voila, you have generated dummy text without a hitch. -->
