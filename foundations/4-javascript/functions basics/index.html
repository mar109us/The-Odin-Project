<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>functions</title>
	<style>
		body {
			background-color: black;
			color: white;
		}
	</style>
</head>

<body>
	<script>

		/* 	For now, just write each function and test the output with console.log. */

		/* 	Write a function called add7 that takes one number and returns that number + 7.
			add7(10) should return 17 */

		function add7(number) {
			return number + 7
		}
		console.log(add7(10))

		/* 	Write a function called multiply that takes 2 numbers and returns their product.
			multiply(3, 2) should return 6 */

		function multiply(number1, number2) {
			return number1 * number2
		}

		console.log(multiply(10, 10))

		/* 	Write a function called capitalize that takes a string and returns that string with only the first letter
			capitalized. Make sure that it can take strings that are lowercase, UPPERCASE or BoTh.
			capitalize("abcd") should return "Abcd"
			capitalize("ABCD") should return "Abcd"
			capitalize("aBcD") should return "Abcd" */

		function capitalize(string) {
			return `${string.charAt(0).toUpperCase()}${string.toLowerCase()}`
		}

		console.log(capitalize("kgslkLKGJJGDKklg"))

		/* 	Write a function called lastLetter that takes a string and returns the very last letter of that string:
			lastLetter("abcd") should return "d" */

		function lastLetter(string) {
			let localStringLength = string.length -= 1
			return string.charAt(localStringLength)
		}

		console.log(lastLetter("abcdef"))
	</script>
</body>

</html>
